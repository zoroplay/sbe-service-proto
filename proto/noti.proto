syntax = "proto3";

import "google/protobuf/struct.proto";

package notification;

service NotificationService {
  rpc SetReadNotifications (SetReadNotificationsRequest) returns (SetReadNotificationsResponse);
  rpc GetUserNotifications (GetUserNotificationsRequest) returns (GetUserNotificationsResponse);
  rpc HandleNotifications (HandleNotificationsRequest) returns (HandleNotificationsResponse);
  rpc SaveSettings (SaveSettingsRequest) returns (SaveSettingsResponse);
  rpc GetSettings (GetSettingsRequest) returns (GetSettingsResponse);
  rpc SendSms (SendSmsRequest) returns (SendSmsResponse);
  rpc SendOtp (SendOtpRequest) returns (SendSmsResponse);
  rpc verifyOtp (VerifyOtpRequest) returns (SendSmsResponse);
  rpc GetDeliveryReport (DeliveryReportRequest) returns (DeliveryReportResponse);

  rpc findOneMessage (FindOneMessage) returns (CommonResponseObj) {}
  rpc FindAllMessages (ClientIdRequest) returns (CommonResponseObj) {}
  rpc updateMessage (CreateMessageRequest) returns (CommonResponseObj) {}
  rpc deleteMessage (FindOneMessage) returns (CommonResponseObj) {}
  rpc createMessage (CreateMessageRequest) returns (CommonResponseObj) {}


  rpc sendMessage (SendMessageRequest) returns (CommonResponseObj) {}

  rpc findUserMessages (GetUserNotificationsRequest) returns (CommonResponseObj) {}
  rpc updateUserMessage (FindOneMessage) returns (CommonResponseObj) {}
  rpc deleteUserMessage (FindOneMessage) returns (CommonResponseObj) {}

  // Chat RPCs
  rpc GetChatHistory (ChatIdRequest) returns (CommonResponseObj) {}
  rpc GetMessages (ChatIdRequest) returns (CommonResponseObj) {}
  rpc GetChats (GetChatsRequest) returns (CommonResponseObj) {}
  rpc IsParticipant (ChatParticipantRequest) returns (IsParticipantResponse) {}
  rpc LeaveChat (ChatParticipantRequest) returns (CommonResponseObj) {}
  rpc SendChatMessage (SendChatMessageRequest) returns (CommonResponseObj) {}
  rpc CreateAndSendMessage (CreateAndSendMessageRequest) returns (CommonResponseObj) {}
  rpc MarkMessagesAsRead (ChatParticipantRequest) returns (CommonResponseObj) {}
  rpc CreateDirectChat (CreateDirectChatRequest) returns (CommonResponseObj) {}
  rpc GetParticipants (ChatIdRequest) returns (CommonResponseObj) {}
  rpc UpdateMessageStatus (UpdateMessageStatusRequest) returns (CommonResponseObj) {}
  rpc UpdateStatus (UpdateStatusRequest) returns (CommonResponseObj) {}
  rpc CreateChat (CreateChatRequest) returns (CommonResponseObj) {}
  rpc GetChatMessages (ChatIdRequest) returns (CommonResponseObj) {}
  rpc GetLastMessage (ChatIdRequest) returns (CommonResponseObj) {}
  rpc GetLastMessagesForChats (GetLastMessagesRequest) returns (CommonResponseObj) {}

  // Push notification RPCs
  rpc SavePushSubscription (SavePushSubscriptionRequest) returns (CommonResponseObj) {}
  rpc SendNotificationToUser (SendNotificationToUserRequest) returns (SendNotificationToUserResponse) {}
}


// Menu
message CreateMessageRequest {
  string title = 1;
  int32 clientId = 2;
  string content = 3;
  bool status = 4;
  optional int32 id = 6;
  optional string createdAt = 7;
  optional string updatedAt = 8;
}

message FindOneMessage {
  int32 clientId = 1;
  int32 id = 2;
}

message ClientIdRequest {
  int32 clientId = 1;
}

message CommonResponseObj{
  optional int32 status = 1;
  optional bool success = 2;
  string message = 3;
  optional google.protobuf.Struct data = 4;
  optional string errors = 5;
}

message SendMessageRequest {
  int32 clientId = 1;
  int32 messageId = 2;
  string userId = 3;
}


message HandleNotificationsRequest {
  int32 userId = 1;
  string description = 2;
  string title = 3;
}
message GetUserNotificationsRequest {
  int32 userId = 1;
}
message SetReadNotificationsRequest {
  int32 id = 1;
}


message HandleNotificationsResponse {
  string message = 1;
  bool   status = 2;
  optional Notifications data = 3;
}

message SetReadNotificationsResponse {
  string message = 1;
  bool   status = 2;
  Notifications  data = 3;
}

message GetUserNotificationsResponse {
  string message = 1;
  bool   status = 2;
  repeated Notifications  data = 3;
}
message Notifications {
  int32 userId = 1;
  string description = 2;
  string title = 3;
  int32 status = 4;
  string createdAt = 5;
  int32 id = 6;
}

message SaveSettingsRequest {
  optional int32  settingsID = 1;
  int32  clientId = 2;
  bool   enable = 3;
  string displayName = 4;
  string gatewayName = 5;
  string senderID = 6;
  optional string apiKey = 7;
  optional string username = 8;
  optional string password = 9;
}

message SaveSettingsResponse {
  string message = 1;
  bool   status = 2;
}

message GetSettingsRequest {
  int32 clientId = 1;
}

message GetSettingsResponse {
  string message = 1;
  bool   status = 2;
  repeated SettingData data = 3;
}

message SettingData {
  int32  id = 1;
  bool   status = 2;
  string displayName = 3;
  string gatewayName = 4;
  string senderID = 5;
  string apiKey = 6;
  string username = 7;
  string password = 8;
}


message SendSmsRequest {
  string msisdn = 1;
  string text = 2;
  string senderID = 3;
  string name = 4;
  string from = 5;
  string status = 6;
  repeated string phoneNumbers = 7;
  string schedule = 8;
  string channel = 9;
  string mode = 10;
  string campaignType = 11;
  int32 clientID = 12;
  string operator = 13;
}

message SendOtpRequest {
  int32 clientID = 1;
  string phoneNumber = 2;
  string operator = 3;
  optional string countryCode = 4;
}

message VerifyOtpRequest {
  int32 clientID = 1;
  string phoneNumber = 2;
  string code =3 ;
}

message SendSmsResponse {
  string message = 1;
  bool   status = 2;
}

message DeliveryReportRequest {
  string username = 1;
  string password = 2;
  string messageId = 3;
}

message DeliveryReportResponse {
  string status = 1;
  string timeSubmitted = 2;
  string timeDelivered = 3;
  string message = 4;
  string sender = 5;
  string messageId = 6;
}

// ── Chat message types ──────────────────────────────────────────────────────

// Shared: any operation that only needs a chat + client scope
message ChatIdRequest {
  string chatId = 1;
  int32  clientId = 2;
}

// GetChats
message GetChatsRequest {
  int32 userId   = 1;
  int32 clientId = 2;
}

// IsParticipant / LeaveChat / MarkMessagesAsRead
message ChatParticipantRequest {
  string chatId  = 1;
  int32  userId  = 2;
  int32  clientId = 3;
}

// IsParticipant response (distinct because it carries a boolean)
message IsParticipantResponse {
  int32  status        = 1;
  bool   isParticipant = 2;
  string message       = 3;
}

// SendChatMessage
message SendChatMessageRequest {
  string chatId    = 1;
  int32  senderId  = 2;
  string content   = 3;
  int32  clientId  = 4;
}

// CreateAndSendMessage
message CreateAndSendMessageRequest {
  int32  senderId      = 1;
  string content       = 2;
  int32  participantId = 3;
  int32  clientId      = 4;
}

// CreateDirectChat
message CreateDirectChatRequest {
  int32 creatorId     = 1;
  int32 participantId = 2;
  int32 clientId      = 3;
}

// UpdateMessageStatus (bulk status transition by recipient)
message UpdateMessageStatusRequest {
  int32  recipientId = 1;
  string fromStatus  = 2;
  string toStatus    = 3;
  int32  clientId    = 4;
}

// UpdateStatus (single message)
message UpdateStatusRequest {
  string messageId = 1;
  string toStatus  = 2;
}

// CreateChat (group)
message CreateChatRequest {
  int32           creatorId      = 1;
  repeated int32  participantIds = 2;
  int32           clientId       = 3;
}

// GetLastMessagesForChats
message GetLastMessagesRequest {
  repeated string chatIds  = 1;
  int32           clientId = 2;
}

// SavePushSubscription
message SavePushSubscriptionRequest {
  int32  userId    = 1;
  int32  clientId  = 2;
  string endpoint  = 3;
  string p256dh    = 4;
  string auth      = 5;
  string platform  = 6; // WEB | ANDROID | IOS  (default: WEB)
}

// SendNotificationToUser
message PushNotificationPayload {
  string title  = 1;
  string body   = 2;
  string icon   = 3;
  string badge  = 4;
  string tag    = 5;
  map<string, string> data = 6;
}

message SendNotificationToUserRequest {
  int32                  userId       = 1;
  PushNotificationPayload notification = 2;
}

message SendNotificationToUserResponse {
  bool   success        = 1;
  string message        = 2;
  int32  successful     = 3;
  int32  failed         = 4;
  optional int32 notificationId = 5;
}
